<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMALER - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .logo h1 {
            font-size: 48px;
            color: #00d4ff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4ff, #090979);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff8888;
            font-size: 13px;
            text-align: center;
        }
        
        .credentials-box {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            text-align: center;
        }
        
        .credentials-box h4 {
            color: #00d4ff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .cred-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .cred-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .cred-item strong {
            color: #00d4ff;
        }
        
        .cred-item span {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>ZMALER</h1>
                <p>Professional Email Marketing Platform</p>
            </div>
            
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            
            <div class="input-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter your password" onkeypress="if(event.key==='Enter') login()">
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="login()">
                <span class="btn-text">🔐 Login to Dashboard</span>
            </button>
            
            <div class="credentials-box">
                <h4>📋 Demo Credentials</h4>
                <div class="cred-row">
                    <div class="cred-item"><strong>Padma</strong> <span>/ pd1234#</span></div>
                    <div class="cred-item"><strong>Jamuna</strong> <span>/ jm809</span></div>
                    <div class="cred-item"><strong>Brahmputra</strong> <span>/ Br123@</span></div>
                </div>
            </div>
            
            <div class="footer">
                © 2024 ZMALER. All rights reserved.
            </div>
        </div>
    </div>
    
    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.style.display = 'none';
            
            if (!username) {
                showError('Please enter your username');
                return;
            }
            
            if (!password) {
                showError('Please enter your password');
                return;
            }
            
            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="btn-text"><span class="loading-spinner"></span> Logging in...</span>';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showError(data.message || 'Invalid username or password');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please make sure the server is running.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        document.getElementById('username').focus();
    </script>
</body>
</html>
