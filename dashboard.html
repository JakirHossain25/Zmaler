<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>STAR SENDER - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1b1f24;
            color: #ecf0f1;
        }
        
        /* Mobile Menu Button */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background: #0984e3;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #2a2f36;
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .sidebar-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #40464f;
            margin-bottom: 20px;
        }
        
        .sidebar-header h2 {
            color: #0984e3;
            font-size: 20px;
        }
        
        .user-info {
            background: #31363f;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .user-info h4 {
            color: #0984e3;
            margin-bottom: 10px;
        }
        
        .credit-bar {
            background: #40464f;
            border-radius: 10px;
            height: 8px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .credit-fill {
            background: #27ae60;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .nav-item {
            display: block;
            padding: 12px 15px;
            color: #ecf0f1;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .nav-item:hover, .nav-item.active {
            background: #0984e3;
        }
        
        .logout-btn {
            background: #e74c3c;
            margin-top: 20px;
            text-align: center;
        }
        
        .logout-btn:hover {
            background: #c0392b;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Cards */
        .card {
            background: #2a2f36;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .card h3 {
            margin-bottom: 20px;
            color: #0984e3;
            font-size: 18px;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: #31363f;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px #0984e3;
        }
        
        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #0984e3;
            color: white;
        }
        
        .btn-primary:hover {
            background: #74b9ff;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #2ecc71;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        /* Button Group */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        /* Progress */
        .progress {
            background: #40464f;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-bar {
            background: #27ae60;
            height: 100%;
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.3s ease;
        }
        
        /* Status */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-success {
            background: #27ae60;
        }
        
        .status-error {
            background: #e74c3c;
        }
        
        .status-warning {
            background: #f39c12;
        }
        
        /* Log Area */
        .log-area {
            background: #1b1f24;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #31363f;
        }
        
        /* Email List */
        .email-list {
            background: #1b1f24;
            border-radius: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .email-item {
            padding: 8px;
            border-bottom: 1px solid #31363f;
            font-size: 13px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 60px 15px 15px 15px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0984e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Terms Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: #2a2f36;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content h3 {
            margin-bottom: 15px;
            color: #0984e3;
        }
        
        .modal-content p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>STAR SENDER</h2>
            <p style="font-size: 12px;">v5.0 Web Edition</p>
        </div>
        
        <div class="user-info">
            <h4 id="usernameDisplay"></h4>
            <div id="creditsInfo">
                <span id="creditsText">Loading...</span>
            </div>
            <div class="credit-bar">
                <div class="credit-fill" id="creditFill"></div>
            </div>
        </div>
        
        <div class="nav-item active" onclick="showTab('send')">📧 Send Emails</div>
        <div class="nav-item" onclick="showTab('terms')">📜 Terms & Conditions</div>
        <div class="nav-item logout-btn" onclick="logout()">🚪 Logout</div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Send Tab -->
        <div id="sendTab">
            <!-- Gmail Auth Card -->
            <div class="card">
                <h3>🔐 Gmail API Authorization</h3>
                <div id="authStatus">
                    <span id="authStatusText">Checking...</span>
                </div>
                <div class="button-group" id="authButtons">
                    <button class="btn btn-primary" onclick="authorizeGmail()" id="authBtn">Authorize Gmail</button>
                </div>
            </div>
            
            <!-- Sender Info Card -->
            <div class="card">
                <h3>📤 Sender Information</h3>
                <div class="form-group">
                    <label>Sender Name</label>
                    <input type="text" id="senderName" placeholder="Sender Name">
                </div>
                <div class="button-group">
                    <button class="btn btn-warning" onclick="generateRandomName()">🎲 Generate Random Name</button>
                </div>
                <div class="form-group">
                    <label>Sender Email</label>
                    <input type="email" id="senderEmail" placeholder="your.email@gmail.com">
                </div>
            </div>
            
            <!-- Email Content Card -->
            <div class="card">
                <h3>✉️ Email Content</h3>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Email Subject">
                </div>
                
                <div class="form-group">
                    <label>Body Type</label>
                    <div class="radio-group">
                        <label><input type="radio" name="bodyType" value="plain" checked> Plain Text</label>
                        <label><input type="radio" name="bodyType" value="html"> HTML</label>
                    </div>
                </div>
                
                <div class="form-group" id="plainBodyGroup">
                    <label>Plain Text Body</label>
                    <textarea id="plainBody" placeholder="Enter your email content here...&#10;&#10;Use placeholders:&#10;#EMAIL# - Recipient Email&#10;#NAME# - Recipient Name&#10;#DATE# - Current Date"></textarea>
                </div>
                
                <div class="form-group" id="htmlBodyGroup" style="display: none;">
                    <label>HTML Body</label>
                    <textarea id="htmlBody" placeholder="<html><body><h1>Hello #NAME#</h1><p>Your order is ready!</p></body></html>" rows="8"></textarea>
                </div>
            </div>
            
            <!-- Recipients Card -->
            <div class="card">
                <h3>👥 Recipients</h3>
                <div class="form-group">
                    <label>Upload Email List (TXT or CSV)</label>
                    <input type="file" id="emailFile" accept=".txt,.csv">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="uploadEmailFile()">📂 Upload & Preview</button>
                </div>
                <div id="emailPreview" class="email-list" style="display: none;">
                    <h4>Email List Preview (<span id="emailCount">0</span> emails)</h4>
                    <div id="emailList"></div>
                </div>
            </div>
            
            <!-- Send Actions -->
            <div class="card">
                <h3>🚀 Send Campaign</h3>
                <div class="button-group">
                    <button class="btn btn-success" onclick="startSending()" id="sendBtn">Send Emails</button>
                    <button class="btn btn-danger" onclick="cancelSending()" id="cancelBtn" style="display: none;">Cancel</button>
                </div>
                
                <div class="progress" id="progressContainer" style="display: none;">
                    <div class="progress-bar" id="progressBar">0%</div>
                </div>
                
                <div id="statusMsg"></div>
                
                <div class="log-area" id="logArea">
                    <div class="log-entry">Ready to send emails...</div>
                </div>
            </div>
        </div>
        
        <!-- Terms Tab -->
        <div id="termsTab" style="display: none;">
            <div class="card">
                <h3>📜 Terms and Conditions</h3>
                <div id="termsContent"></div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="acceptTerms()">✓ I Accept the Terms</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    
    <script>
        let currentUser = '';
        let isAuthorized = false;
        let termsAccepted = false;
        let isSending = false;
        let cancelFlag = false;
        let currentEmails = [];
        
        // Load user data
        async function loadUserData() {
            try {
                const response = await fetch('/get_user_data');
                const data = await response.json();
                currentUser = data.username;
                document.getElementById('usernameDisplay').innerHTML = `👤 ${data.username}`;
                
                const creditsLeft = data.credits_left;
                const maxCredits = data.max_credits;
                const percent = (creditsLeft / maxCredits) * 100;
                
                document.getElementById('creditsText').innerHTML = `📊 Credits: ${creditsLeft}/${maxCredits}`;
                document.getElementById('creditFill').style.width = `${percent}%`;
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        // Check auth status
        async function checkAuth() {
            try {
                const response = await fetch('/check_auth');
                const data = await response.json();
                
                if (data.authorized) {
                    isAuthorized = true;
                    document.getElementById('authStatusText').innerHTML = '<span class="status-badge status-success">✓ Authorized</span>';
                    document.getElementById('authBtn').textContent = 'Re-authorize Gmail';
                } else {
                    isAuthorized = false;
                    document.getElementById('authStatusText').innerHTML = '<span class="status-badge status-error">✗ Not Authorized</span>';
                    document.getElementById('authBtn').textContent = 'Authorize Gmail';
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        }
        
        // Authorize Gmail
        async function authorizeGmail() {
            showLoading(true);
            try {
                const response = await fetch('/get_auth_url');
                const data = await response.json();
                
                if (data.auth_url) {
                    window.location.href = data.auth_url;
                } else {
                    addLog('Failed to get authorization URL: ' + (data.error || 'Unknown error'), 'error');
                    showLoading(false);
                }
            } catch (error) {
                addLog('Authorization error: ' + error.message, 'error');
                showLoading(false);
            }
        }
        
        // Generate random name
        async function generateRandomName() {
            try {
                const response = await fetch('/generate_random_name');
                const data = await response.json();
                document.getElementById('senderName').value = data.name;
                addLog('Generated random sender name: ' + data.name);
            } catch (error) {
                console.error('Error generating name:', error);
            }
        }
        
        // Upload email file
        async function uploadEmailFile() {
            const fileInput = document.getElementById('emailFile');
            const file = fileInput.files[0];
            
            if (!file) {
                addLog('Please select a file first', 'error');
                return;
            }
            
            showLoading(true);
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/upload_emails', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.emails) {
                    currentEmails = data.emails;
                    document.getElementById('emailCount').textContent = data.count;
                    
                    const emailListDiv = document.getElementById('emailList');
                    emailListDiv.innerHTML = '';
                    
                    data.emails.slice(0, 20).forEach(email => {
                        emailListDiv.innerHTML += `<div class="email-item">📧 ${escapeHtml(email)}</div>`;
                    });
                    
                    if (data.count > 20) {
                        emailListDiv.innerHTML += `<div class="email-item">... and ${data.count - 20} more</div>`;
                    }
                    
                    document.getElementById('emailPreview').style.display = 'block';
                    addLog(`Loaded ${data.count} email addresses`);
                } else {
                    addLog('Error: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                addLog('Upload error: ' + error.message, 'error');
            }
            
            showLoading(false);
        }
        
        // Body type toggle
        document.querySelectorAll('input[name="bodyType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'plain') {
                    document.getElementById('plainBodyGroup').style.display = 'block';
                    document.getElementById('htmlBodyGroup').style.display = 'none';
                } else {
                    document.getElementById('plainBodyGroup').style.display = 'none';
                    document.getElementById('htmlBodyGroup').style.display = 'block';
                }
            });
        });
        
        // Start sending
        async function startSending() {
            if (!termsAccepted) {
                addLog('Please accept the Terms and Conditions first', 'error');
                showTab('terms');
                return;
            }
            
            if (!isAuthorized) {
                addLog('Please authorize Gmail API first', 'error');
                return;
            }
            
            if (currentEmails.length === 0) {
                addLog('Please upload an email list first', 'error');
                return;
            }
            
            const senderName = document.getElementById('senderName').value;
            const senderEmail = document.getElementById('senderEmail').value;
            const subject = document.getElementById('subject').value;
            const bodyType = document.querySelector('input[name="bodyType"]:checked').value;
            const plainBody = document.getElementById('plainBody').value;
            const htmlBody = document.getElementById('htmlBody').value;
            
            if (!senderName || !senderEmail) {
                addLog('Please enter sender name and email', 'error');
                return;
            }
            
            if (!subject) {
                addLog('Please enter a subject', 'error');
                return;
            }
            
            if (bodyType === 'plain' && !plainBody) {
                addLog('Please enter email body content', 'error');
                return;
            }
            
            if (bodyType === 'html' && !htmlBody) {
                addLog('Please enter HTML content', 'error');
                return;
            }
            
            isSending = true;
            cancelFlag = false;
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            document.getElementById('progressContainer').style.display = 'block';
            
            const totalEmails = currentEmails.length;
            let sent = 0;
            let failed = 0;
            
            for (let i = 0; i < totalEmails; i++) {
                if (cancelFlag) {
                    addLog('Sending cancelled by user', 'warning');
                    break;
                }
                
                const batch = [currentEmails[i]];
                updateProgress((i + 1) / totalEmails * 100, `${i+1}/${totalEmails}`);
                addLog(`Sending to: ${currentEmails[i]}...`);
                
                try {
                    const response = await fetch('/send_emails', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            emails: batch,
                            subject: subject,
                            body: plainBody,
                            html_content: htmlBody,
                            sender_name: senderName,
                            sender_email: senderEmail,
                            body_type: bodyType
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        sent += data.sent;
                        failed += data.failed;
                        if (data.sent > 0) {
                            addLog(`✓ Sent to ${currentEmails[i]}`);
                        } else {
                            addLog(`✗ Failed to send to ${currentEmails[i]}: ${data.failed_emails[0]?.error || 'Unknown error'}`, 'error');
                        }
                    } else {
                        failed++;
                        addLog(`✗ Failed to send to ${currentEmails[i]}: ${data.error}`, 'error');
                    }
                } catch (error) {
                    failed++;
                    addLog(`✗ Error sending to ${currentEmails[i]}: ${error.message}`, 'error');
                }
                
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            addLog(`✅ Campaign completed! Sent: ${sent}, Failed: ${failed}`);
            updateProgress(100, `Complete: ${sent} sent, ${failed} failed`);
            
            isSending = false;
            document.getElementById('sendBtn').style.display = 'inline-block';
            document.getElementById('cancelBtn').style.display = 'none';
            
            // Refresh credits
            loadUserData();
        }
        
        function cancelSending() {
            cancelFlag = true;
            addLog('Cancelling sending process...', 'warning');
        }
        
        function updateProgress(percent, text) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = `${percent}%`;
            progressBar.textContent = text || `${Math.round(percent)}%`;
        }
        
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            let icon = 'ℹ️';
            if (type === 'error') icon = '❌';
            if (type === 'warning') icon = '⚠️';
            if (type === 'success') icon = '✅';
            
            logEntry.innerHTML = `<span style="color: #7f8c8d;">[${time}]</span> ${icon} ${escapeHtml(message)}`;
            logArea.appendChild(logEntry);
            logEntry.scrollIntoView();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        function showTab(tab) {
            document.getElementById('sendTab').style.display = tab === 'send' ? 'block' : 'none';
            document.getElementById('termsTab').style.display = tab === 'terms' ? 'block' : 'none';
            
            if (tab === 'terms') {
                loadTerms();
            }
            
            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }
        
        async function loadTerms() {
            try {
                const response = await fetch('/get_terms');
                const data = await response.json();
                const termsHtml = data.terms.replace(/\n/g, '<br>');
                document.getElementById('termsContent').innerHTML = `<p>${termsHtml}</p>`;
            } catch (error) {
                console.error('Error loading terms:', error);
            }
        }
        
        async function acceptTerms() {
            try {
                const response = await fetch('/accept_terms', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    termsAccepted = true;
                    addLog('Terms and Conditions accepted');
                    showTab('send');
                }
            } catch (error) {
                console.error('Error accepting terms:', error);
            }
        }
        
        async function logout() {
            window.location.href = '/logout';
        }
        
        // Initialize
        async function init() {
            await loadUserData();
            await checkAuth();
            
            // Generate random name on load
            await generateRandomName();
        }
        
        init();
    </script>
</body>
</html>
